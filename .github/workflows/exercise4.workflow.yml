name: Workflow of exercise 4
run-name: Fourth workflow - matrix # Optional

# Events triggering the workflow
on: 
  push:
    branches: 
      - main
  workflow_dispatch:

# Group of jobs to run as part of the workflow
env:
  MY_VAR: "exercise 4 env"
jobs:
  matrix_test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12", "3.13", "3.14" ]
        os: [ "windows-latest", "macos-latest", "ubuntu-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          
      - name: Style check
        id: style_check
        if: ${{ matrix.python-version == '3.14' }}
        run: python -m black mycode.py
      - name: Run test
        if: ${{ steps.style_check.outcome == 'success' }}
        run: |
          python -m pytest test_mycode.py


