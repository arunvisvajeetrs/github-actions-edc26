name: Workflow of exercise 3
run-name: Third workflow - vars # Optional

# Events triggering the workflow
on: 
  workflow_dispatch:

# Group of jobs to run as part of the workflow
env:
  MY_VAR: "exercise 3 env"
permissions:
  contents: read
  artifact-metadata: read
  packages: read
jobs:
  vars_test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo GITHUB_TOKEN is ${{secrets.GITHUB_TOKEN}}
          echo MY_VAR is "${{vars.MY_VAR}}"
          echo "${{ env.MY_VAR }}"
      - name: condition based on secret
        env: 
          MY_SECRET: ${{secrets.MY_SECRET}}
        if: ${{env.MY_SECRET == 'apple'}}
        run: |
          echo "Read the secret and matched"



